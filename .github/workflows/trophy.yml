name: Generate trophy card

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate trophy SVG files
        run: |
          set -euo pipefail

          mkdir -p dist

          curl --fail --location --retry 3 \
            "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=dracula&column=-1&row=1&margin-w=8&margin-h=8&no-bg=true&no-frame=true" \
            --output dist/trophy-dark.svg

          curl --fail --location --retry 3 \
            "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=flat&column=-1&row=1&margin-w=8&margin-h=8&no-bg=true&no-frame=true" \
            --output dist/trophy-light.svg

          cp dist/trophy-dark.svg dist/trophy.svg

      - name: Push trophy SVG files to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: trophy-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}